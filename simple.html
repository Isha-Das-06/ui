<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        console.log("Starting React app...");
        
        const { useState, useEffect, useRef } = React;
        
        try {
            // Load the external file content
            fetch('top1pct-os.jsx')
                .then(response => response.text())
                .then(code => {
                    console.log("File loaded, executing...");
                    // Execute the code
                    const transformedCode = Babel.transform(code, {
                        presets: ['react'],
                        plugins: []
                    }).code;
                    
                    // Execute the transformed code
                    eval(transformedCode);
                    console.log("App executed successfully");
                })
                .catch(error => {
                    console.error("Error loading file:", error);
                    document.getElementById('root').innerHTML = '<div style="color:red; padding:20px;">Error loading file: ' + error.message + '</div>';
                });
        } catch (error) {
            console.error("Error:", error);
            document.getElementById('root').innerHTML = '<div style="color:red; padding:20px;">Error: ' + error.message + '</div>';
        }
    </script>
</body>
</html>
