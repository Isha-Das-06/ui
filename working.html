<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 1% OS - Working</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap');
        
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg: #080b10;
            --bg2: #0d1117;
            --bg3: #141b24;
            --surface: #1a2233;
            --surface2: #1e2940;
            --border: rgba(255,255,255,0.07);
            --border-active: rgba(99,210,255,0.35);
            --accent: #63d2ff;
            --accent2: #ff5e5e;
            --accent3: #7fff6e;
            --accent4: #ffd166;
            --text: #e8eef5;
            --text2: #8a9ab5;
            --text3: #4a5a72;
            --gold: #ffd166;
            --purple: #a78bfa;
            --radius: 10px;
            --mono: 'Space Mono', monospace;
            --sans: 'Syne', sans-serif;
        }

        html, body, #root { height: 100%; }
        body { background: var(--bg); color: var(--text); font-family: var(--sans); overflow-x: hidden; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg2); }
        ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

        .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 40px; position: relative; overflow: hidden; }
        .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(99,210,255,0.08) 0%, transparent 70%); pointer-events: none; }
        .hero-label { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
        .hero-title { font-size: clamp(42px,6vw,80px); font-weight: 800; line-height: 1.05; background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, #fff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .hero-sub { font-size: 16px; color: var(--text2); max-width: 560px; line-height: 1.7; margin-bottom: 36px; }
        .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .hero-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin-top: 60px; width: 100%; max-width: 800px; }
        .hero-stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
        .hero-stat-val { font-family: var(--mono); font-size: 28px; color: var(--accent); font-weight: 700; }
        .hero-stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
        
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 7px; font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: none; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #a0e8ff; }
        .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        function PageLanding({ onNav }) {
            return (
                <div className="hero">
                    <div className="hero-label">◈ Top 1% Operating System</div>
                    <h1 className="hero-title">Dominate Your<br />Peer Group.</h1>
                    <p className="hero-sub">The only platform that quantifies your competitive edge, models your future, and builds a week-by-week execution plan to reach the top.</p>
                    <div className="hero-cta">
                        <button className="btn btn-primary" style={{ padding: "12px 32px", fontSize: 14 }} onClick={() => onNav(2)}>Get Your Score →</button>
                        <button className="btn btn-ghost" style={{ padding: "12px 32px", fontSize: 14 }} onClick={() => onNav(1)}>Sign Up Free</button>
                    </div>
                    <div className="hero-grid">
                        {[
                            ["12,400+", "Students Tracked"], 
                            ["Top 0.1%", "Unlockable Tier"], 
                            ["47 Signals", "Analyzed Per Profile"]
                        ].map(([v, l]) => (
                            <div key={l} className="hero-stat">
                                <div className="hero-stat-val">{v}</div>
                                <div className="hero-stat-label">{l}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        
        function PageSignup({ onNav }) {
            return (
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", padding: "40px" }}>
                    <div style={{ background: "var(--bg2)", border: "1px solid var(--border)", borderRadius: "10px", padding: "28px", maxWidth: 420, width: "100%" }}>
                        <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 4 }}>Create Account</div>
                        <div style={{ fontSize: 13, color: "var(--text2)", marginBottom: 24 }}>Join 12,400+ students competing at the top.</div>
                        <div style={{ marginBottom: 18 }}>
                            <label style={{ fontSize: 12, color: "var(--text2)", marginBottom: 6, display: "block", fontWeight: 600 }}>Email</label>
                            <input style={{ width: "100%", padding: "10px 14px", background: "var(--bg3)", border: "1px solid var(--border)", borderRadius: 7, color: "var(--text)", fontSize: 13 }} placeholder="you@example.com" />
                        </div>
                        <div style={{ marginBottom: 18 }}>
                            <label style={{ fontSize: 12, color: "var(--text2)", marginBottom: 6, display: "block", fontWeight: 600 }}>Password</label>
                            <input type="password" style={{ width: "100%", padding: "10px 14px", background: "var(--bg3)", border: "1px solid var(--border)", borderRadius: 7, color: "var(--text)", fontSize: 13 }} placeholder="••••••••" />
                        </div>
                        <button className="btn btn-primary" style={{ width: "100%", justifyContent: "center", marginBottom: 16 }}>Create Account</button>
                        <div style={{ textAlign: "center", fontSize: 12, color: "var(--text3)", margin: "20px 0" }}>or continue with</div>
                        <div style={{ display: "flex", gap: 8 }}>
                            <button className="btn btn-ghost" style={{ flex: 1, justifyContent: "center" }}>🔵 Google</button>
                            <button className="btn btn-ghost" style={{ flex: 1, justifyContent: "center" }}>⬛ GitHub</button>
                        </div>
                        <div style={{ fontSize: 12, color: "var(--text2)", marginTop: 16, textAlign: "center" }}>
                            Already have an account? <span style={{ color: "var(--accent)", cursor: "pointer" }} onClick={() => onNav(2)}>Log in</span>
                        </div>
                    </div>
                </div>
            );
        }
        
        function App() {
            const [page, setPage] = useState(0);
            
            return (
                <>
                    {page === 0 && <PageLanding onNav={setPage} />}
                    {page === 1 && <PageSignup onNav={setPage} />}
                    {page === 2 && <div style={{ padding: "40px", textAlign: "center" }}><h2>Get Your Score</h2><button className="btn btn-ghost" onClick={() => setPage(0)}>Back</button></div>}
                </>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
