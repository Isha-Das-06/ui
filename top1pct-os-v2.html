<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Top 1% OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%;width:100%}
    body{background:#0a0a12;font-family:'Inter',sans-serif;overflow:hidden}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(124,58,237,0.3);border-radius:2px}
    #root{display:flex;height:100vh}
    #loading{display:flex;align-items:center;justify-content:center;height:100vh;
      color:#8b5cf6;font-family:Inter,sans-serif;font-size:14px;letter-spacing:3px;
      background:#0a0a12;width:100%}
  </style>
</head>
<body>
<div id="root"><div id="loading">◈ LOADING...</div></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ─────────────────────── DESIGN SYSTEM ─────────────────────── */
const G = {
  bg0: '#0a0a12',
  bg1: '#0f0f1a',
  bg2: '#13131f',
  bg3: '#1a1a2e',
  surface: '#1e1e32',
  surface2: '#252540',
  border: 'rgba(255,255,255,0.06)',
  borderPurple: 'rgba(139,92,246,0.25)',
  purple: '#7c3aed',
  purpleLight: '#8b5cf6',
  purpleBright: '#a78bfa',
  purpleGlow: 'rgba(124,58,237,0.15)',
  purpleGlow2: 'rgba(124,58,237,0.08)',
  green: '#10b981',
  greenBright: '#34d399',
  orange: '#f97316',
  red: '#ef4444',
  yellow: '#eab308',
  text: '#f1f0ff',
  text2: '#9ca3c7',
  text3: '#4b5280',
};

const css = `
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:${G.bg0};color:${G.text};font-family:'Inter',sans-serif;overflow:hidden}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(139,92,246,0.3);border-radius:2px}

/* LAYOUT */
.app{display:flex;height:100vh;width:100vw;overflow:hidden;position:relative}

/* PURPLE GLOW BACKGROUNDS */
.glow-blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px)}
.glow-1{width:600px;height:600px;background:radial-gradient(circle,rgba(124,58,237,0.18) 0%,transparent 70%);top:-100px;left:-100px}
.glow-2{width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,0.12) 0%,transparent 70%);bottom:0;right:200px}
.glow-3{width:300px;height:300px;background:radial-gradient(circle,rgba(139,92,246,0.1) 0%,transparent 70%);top:50%;right:0}

/* SIDEBAR */
.sidebar{
  width:230px;min-width:230px;background:${G.bg1};
  border-right:1px solid ${G.border};
  display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
  position:relative;z-index:10;
  flex-shrink:0;
}
.sidebar-logo{
  padding:22px 20px 18px;
  border-bottom:1px solid ${G.border};
  display:flex;align-items:center;gap:10px;
  font-size:15px;font-weight:800;color:${G.text};letter-spacing:-0.3px;
}
.logo-icon{
  width:30px;height:30px;background:${G.purple};border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff;flex-shrink:0;
  box-shadow:0 0 20px rgba(124,58,237,0.4);
}
.logo-text em{font-style:italic;color:${G.purpleBright}}

.sidebar-section{padding:16px 12px 4px}
.sidebar-section-label{
  font-size:9px;color:${G.text3};letter-spacing:1.5px;
  text-transform:uppercase;padding:0 8px 8px;font-weight:600;
}
.sidebar-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;
  border-radius:8px;cursor:pointer;font-size:12px;color:${G.text2};
  transition:all 0.15s ease;margin-bottom:1px;font-weight:500;
  border:1px solid transparent;
}
.sidebar-item:hover{background:${G.surface};color:${G.text}}
.sidebar-item.active{
  background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(139,92,246,0.12));
  color:${G.purpleBright};border-color:rgba(139,92,246,0.2);
}
.sidebar-item .s-icon{font-size:13px;min-width:18px;text-align:center;opacity:0.8}
.sidebar-item .s-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notif-dot{width:5px;height:5px;background:${G.red};border-radius:50%;margin-left:auto;flex-shrink:0;box-shadow:0 0 6px ${G.red}}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:1;min-width:0}
.page{min-height:100vh;padding:28px 32px;max-width:1020px;margin:0 auto;position:relative}

/* PAGE HEADER */
.page-header{margin-bottom:28px}
.page-tag{
  font-size:9px;color:${G.purple};letter-spacing:2px;text-transform:uppercase;
  font-weight:700;margin-bottom:8px;display:block;
  background:rgba(124,58,237,0.1);padding:4px 10px;border-radius:20px;
  border:1px solid rgba(124,58,237,0.2);display:inline-block;
}
.page-title{font-size:24px;font-weight:800;color:${G.text};line-height:1.2;letter-spacing:-0.5px;margin-top:8px}
.page-title em{font-style:italic;color:${G.purpleBright}}
.page-sub{font-size:13px;color:${G.text2};margin-top:6px;line-height:1.65;max-width:580px}

/* CARDS */
.card{
  background:${G.bg2};border:1px solid ${G.border};border-radius:12px;
  padding:20px;transition:border-color 0.2s,background 0.2s;
}
.card:hover{border-color:rgba(139,92,246,0.15)}
.card-title{font-size:13px;font-weight:700;color:${G.text};margin-bottom:4px}
.card-sub{font-size:12px;color:${G.text2};line-height:1.5}

/* GRIDS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* STAT CARDS */
.stat-card{background:${G.bg2};border:1px solid ${G.border};border-radius:12px;padding:18px}
.stat-val{font-size:30px;font-weight:800;color:${G.purpleBright};letter-spacing:-1px}
.stat-label{font-size:10px;color:${G.text3};margin-top:4px;text-transform:uppercase;letter-spacing:1px;font-weight:600}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:9px 18px;
  border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all 0.15s;border:none;letter-spacing:-0.2px;
}
.btn-primary{
  background:linear-gradient(135deg,${G.purple},${G.purpleLight});color:#fff;
  box-shadow:0 4px 20px rgba(124,58,237,0.35);
}
.btn-primary:hover{box-shadow:0 6px 28px rgba(124,58,237,0.5);transform:translateY(-1px)}
.btn-secondary{background:${G.surface};color:${G.text};border:1px solid ${G.border}}
.btn-secondary:hover{border-color:${G.borderPurple};color:${G.purpleBright}}
.btn-ghost{background:transparent;color:${G.text2};border:1px solid ${G.border}}
.btn-ghost:hover{color:${G.text};border-color:rgba(255,255,255,0.12)}
.btn-danger{background:rgba(239,68,68,0.1);color:${G.red};border:1px solid rgba(239,68,68,0.2)}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.3px}
.badge-purple{background:rgba(124,58,237,0.15);color:${G.purpleBright};border:1px solid rgba(139,92,246,0.25)}
.badge-green{background:rgba(16,185,129,0.12);color:${G.greenBright};border:1px solid rgba(16,185,129,0.25)}
.badge-red{background:rgba(239,68,68,0.1);color:${G.red};border:1px solid rgba(239,68,68,0.2)}
.badge-yellow{background:rgba(234,179,8,0.1);color:${G.yellow};border:1px solid rgba(234,179,8,0.2)}
.badge-orange{background:rgba(249,115,22,0.1);color:${G.orange};border:1px solid rgba(249,115,22,0.2)}
.badge-gray{background:rgba(255,255,255,0.06);color:${G.text2};border:1px solid ${G.border}}

/* INPUTS */
.input-group{margin-bottom:16px}
.input-label{font-size:11px;color:${G.text2};margin-bottom:6px;display:block;font-weight:600;letter-spacing:0.3px}
.input{
  width:100%;padding:10px 14px;
  background:${G.bg3};border:1px solid ${G.border};
  border-radius:8px;color:${G.text};font-family:'Inter',sans-serif;font-size:13px;
  outline:none;transition:border-color 0.15s,box-shadow 0.15s;
}
.input:focus{border-color:${G.borderPurple};box-shadow:0 0 0 3px rgba(124,58,237,0.1)}
.input::placeholder{color:${G.text3}}
textarea.input{resize:vertical;min-height:80px}
select.input{cursor:pointer;appearance:none}

/* PROGRESS BARS */
.progress-bar{height:5px;background:${G.surface};border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}
.fill-purple{background:linear-gradient(90deg,${G.purple},${G.purpleBright})}
.fill-green{background:linear-gradient(90deg,${G.green},${G.greenBright})}
.fill-orange{background:linear-gradient(90deg,${G.orange},#fb923c)}
.fill-red{background:linear-gradient(90deg,${G.red},#f87171)}
.fill-yellow{background:linear-gradient(90deg,${G.yellow},#fbbf24)}

/* TABLE */
.table{width:100%;border-collapse:collapse}
.table th{font-size:9px;color:${G.text3};text-transform:uppercase;letter-spacing:1.5px;
  padding:8px 12px;text-align:left;border-bottom:1px solid ${G.border};font-weight:700}
.table td{padding:11px 12px;border-bottom:1px solid ${G.border};font-size:12px;color:${G.text2}}
.table tr:hover td{background:rgba(255,255,255,0.02);color:${G.text}}
.table tr:last-child td{border-bottom:none}

/* TIMELINE */
.timeline{position:relative;padding-left:22px}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:${G.border}}
.timeline-item{position:relative;margin-bottom:18px}
.timeline-dot{
  position:absolute;left:-22px;top:3px;width:12px;height:12px;
  border-radius:50%;border:2px solid ${G.purple};background:${G.bg0};
  box-shadow:0 0 8px rgba(124,58,237,0.3);
}
.timeline-dot.done{background:${G.purple};box-shadow:0 0 12px rgba(124,58,237,0.5)}
.timeline-title{font-size:13px;font-weight:600;color:${G.text}}
.timeline-sub{font-size:11px;color:${G.text2};margin-top:3px;line-height:1.5}

/* CHIPS */
.chip{
  display:inline-block;padding:5px 12px;background:${G.surface};
  border:1px solid ${G.border};border-radius:20px;font-size:12px;
  color:${G.text2};cursor:pointer;transition:all 0.15s;margin:3px;
}
.chip:hover,.chip.selected{
  background:rgba(124,58,237,0.15);color:${G.purpleBright};
  border-color:${G.borderPurple};
}

/* DIVIDER */
.divider{height:1px;background:${G.border};margin:20px 0}

/* ALERTS */
.alert{padding:12px 16px;border-radius:10px;font-size:12px;margin-bottom:12px;line-height:1.5}
.alert-info{background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.2);color:${G.purpleBright}}
.alert-warn{background:rgba(234,179,8,0.06);border:1px solid rgba(234,179,8,0.2);color:${G.yellow}}
.alert-success{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);color:${G.greenBright}}
.alert-danger{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.2);color:${G.red}}

/* FLEX UTILS */
.row{display:flex;gap:14px;align-items:center}
.col{display:flex;flex-direction:column}
.spacer{flex:1}
.flex{display:flex}
.items-center{align-items:center}
.gap4{gap:4px}.gap8{gap:8px}.gap12{gap:12px}.gap14{gap:14px}.gap16{gap:16px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.fw600{font-weight:600}.fw700{font-weight:700}.fw800{font-weight:800}
.text-sm{font-size:12px}.text-xs{font-size:11px}.text-base{font-size:13px}
.text2{color:${G.text2}}.text3{color:${G.text3}}
.text-purple{color:${G.purpleBright}}.text-green{color:${G.greenBright}}
.text-red{color:${G.red}}.text-yellow{color:${G.yellow}}.text-orange{color:${G.orange}}
.mono{font-family:'SF Mono','Fira Code',monospace}

/* SECTION TITLE */
.section-title{
  font-size:11px;font-weight:700;color:${G.text};margin-bottom:14px;
  display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:1px;
}
.section-title::after{content:'';flex:1;height:1px;background:${G.border}}

/* SLIDER */
.slider-input{-webkit-appearance:none;appearance:none;width:100%;height:3px;background:${G.surface};border-radius:2px;outline:none}
.slider-input::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:${G.purple};cursor:pointer;box-shadow:0 0 10px rgba(124,58,237,0.5)}

/* TOGGLE */
.toggle-wrap{display:flex;background:${G.surface};border-radius:10px;padding:3px;gap:2px}
.toggle-btn{flex:1;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s;color:${G.text2}}
.toggle-btn.active{background:${G.purple};color:#fff;box-shadow:0 2px 10px rgba(124,58,237,0.3)}

/* HERO */
.hero{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:60px 40px;position:relative;overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 50% -10%,rgba(124,58,237,0.2) 0%,transparent 70%);
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(124,58,237,0.12);border:1px solid rgba(139,92,246,0.25);
  border-radius:20px;padding:6px 14px;font-size:11px;color:${G.purpleBright};
  font-weight:600;letter-spacing:0.5px;margin-bottom:22px;
}
.hero-badge-dot{width:6px;height:6px;background:${G.purple};border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
.hero-title{
  font-size:clamp(44px,5.5vw,76px);font-weight:900;line-height:1.05;
  color:${G.text};letter-spacing:-2px;margin-bottom:20px;
}
.hero-title em{font-style:italic;color:${G.purpleBright}}
.hero-title .white{color:#fff}
.hero-sub{font-size:15px;color:${G.text2};max-width:520px;line-height:1.7;margin-bottom:36px}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.hero-stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
  margin-top:56px;width:100%;max-width:720px;
}
.hero-stat{
  background:rgba(255,255,255,0.03);border:1px solid ${G.border};
  border-radius:12px;padding:18px 20px;text-align:left;
  backdrop-filter:blur(10px);
}
.hero-stat-val{font-size:26px;font-weight:800;color:${G.purpleBright};letter-spacing:-1px}
.hero-stat-label{font-size:11px;color:${G.text2};margin-top:4px}

/* FORM */
.form-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;position:relative}
.form-card{
  background:${G.bg2};border:1px solid ${G.border};border-radius:16px;
  padding:32px;width:100%;max-width:420px;position:relative;z-index:2;
  box-shadow:0 24px 60px rgba(0,0,0,0.4),0 0 60px rgba(124,58,237,0.08);
}
.form-glow{
  position:absolute;width:300px;height:300px;
  background:radial-gradient(circle,rgba(124,58,237,0.15) 0%,transparent 70%);
  border-radius:50%;pointer-events:none;filter:blur(40px);
}
.form-title{font-size:22px;font-weight:800;color:${G.text};letter-spacing:-0.5px;margin-bottom:4px}
.form-sub{font-size:13px;color:${G.text2};margin-bottom:24px;line-height:1.5}
.form-divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:${G.text3};font-size:11px}
.form-divider::before,.form-divider::after{content:'';flex:1;height:1px;background:${G.border}}

/* IDENTITY CARDS */
.id-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.id-card{
  background:${G.bg3};border:1.5px solid ${G.border};border-radius:12px;
  padding:20px 16px;cursor:pointer;transition:all 0.2s;text-align:center;
  position:relative;overflow:hidden;
}
.id-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,0.12),transparent);
  opacity:0;transition:opacity 0.2s;
}
.id-card:hover{border-color:${G.borderPurple};transform:translateY(-2px)}
.id-card:hover::before{opacity:1}
.id-card.selected{border-color:${G.purple};background:rgba(124,58,237,0.1)}
.id-card.selected::before{opacity:1}
.id-icon{font-size:28px;margin-bottom:10px}
.id-name{font-size:13px;font-weight:700;color:${G.text};margin-bottom:4px}
.id-desc{font-size:10px;color:${G.text2};line-height:1.4}
.id-check{
  position:absolute;top:10px;right:10px;width:18px;height:18px;
  border-radius:50%;border:1.5px solid ${G.border};background:transparent;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.id-card.selected .id-check{background:${G.purple};border-color:${G.purple}}

/* XP BAR */
.xp-bar-wrap{
  background:${G.bg2};border:1px solid ${G.border};border-radius:12px;
  padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;
}
.xp-level{font-size:10px;color:${G.purpleBright};font-weight:700;letter-spacing:1px;white-space:nowrap}
.xp-bar{flex:1}
.xp-pts{font-size:10px;color:${G.text3};font-weight:600;white-space:nowrap}

/* LEADERBOARD */
.lb-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  background:${G.bg2};border:1px solid ${G.border};border-radius:10px;
  margin-bottom:6px;transition:all 0.15s;
}
.lb-item:hover{border-color:${G.borderPurple}}
.lb-rank{font-size:13px;font-weight:800;color:${G.text3};min-width:26px}
.lb-rank.r1{color:#fbbf24}.lb-rank.r2{color:#d1d5db}.lb-rank.r3{color:#cd7f32}
.lb-name{flex:1;font-size:13px;font-weight:600;color:${G.text}}
.lb-score{font-size:14px;font-weight:800;color:${G.purpleBright}}

/* RADAR */
.radar-svg polygon{fill:rgba(124,58,237,0.15);stroke:${G.purpleLight};stroke-width:1.5}
.radar-svg .grid-poly{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:1}
.radar-svg text{fill:${G.text2};font-size:9px;font-family:'Inter',sans-serif;font-weight:600}

/* AUTH TOP BAR */
.auth-topbar{
  position:fixed;top:0;left:0;right:0;
  padding:16px 28px;display:flex;align-items:center;justify-content:space-between;
  z-index:100;
}
.auth-logo{
  display:flex;align-items:center;gap:9px;
  font-size:14px;font-weight:800;color:${G.text};cursor:pointer;
}
.auth-nav{display:flex;gap:8px}

/* STEP INDICATOR */
.step-bar{display:flex;gap:4px;margin-bottom:28px}
.step-seg{height:3px;flex:1;border-radius:2px;background:${G.surface};transition:background 0.3s}
.step-seg.done{background:${G.purple}}
.step-seg.active{background:linear-gradient(90deg,${G.purple},${G.purpleBright})}

/* TAG */
.tag{
  display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;
  background:${G.surface};color:${G.text2};margin:2px;font-weight:600;
}

/* SCORE RING */
.score-ring-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(99,102,241,0.08));

function MiniBar({ val, color = "purple", showPct = true }) {
  const fills = { purple: "fill-purple", green: "fill-green", orange: "fill-orange", red: "fill-red", yellow: "fill-yellow" };
  return (
    <div className="flex items-center gap8">
      <div className="progress-bar" style={{ flex: 1 }}>
        <div className={`progress-fill ${fills[color] || "fill-purple"}`} style={{ width: `${val}%` }} />
      </div>
      {showPct && <span className="text-xs mono text3" style={{ minWidth: 30, textAlign: "right" }}>{val}%</span>}
    </div>
  );
}

function RadarChart({ data, size = 240 }) {
  const cx = size / 2, cy = size / 2, r = size * 0.36;
  const n = data.length;
  const angle = (i) => (Math.PI * 2 * i) / n - Math.PI / 2;
  const pt = (i, pct) => [cx + r * pct * Math.cos(angle(i)), cy + r * pct * Math.sin(angle(i))];
  return (
    <svg width={size} height={size} className="radar-svg">
      {[0.25, 0.5, 0.75, 1].map((l) => (
        <polygon key={l} className="grid-poly" points={data.map((_, i) => pt(i, l).join(",")).join(" ")} />
      ))}
      {data.map((_, i) => {
        const [x, y] = pt(i, 1);
        return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="rgba(255,255,255,0.05)" strokeWidth="1" />;
      })}
      <polygon points={data.map((d, i) => pt(i, d.val / 100).join(",")).join(" ")} />
      {data.map((d, i) => {
        const [x, y] = pt(i, 1.2);
        return <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle">{d.label}</text>;
      })}
    </svg>
  );
}
